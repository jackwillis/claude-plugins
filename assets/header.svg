<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <!-- Angular red panda-boltund with tulips -->

  <!-- Tulip 1 (left) -->
  <line x1="24" y1="100" x2="24" y2="155" stroke="#2ecc71" stroke-width="3" stroke-linecap="round"/>
  <path d="M 16 100 Q 14 82 24 74 Q 34 82 32 100 Z" fill="#e74c3c"/>
  <path d="M 20 100 Q 22 86 24 78 Q 26 86 28 100 Z" fill="#c0392b"/>
  <ellipse cx="14" cy="130" rx="10" ry="4" fill="#27ae60" transform="rotate(-30 14 130)"/>
  <ellipse cx="34" cy="120" rx="10" ry="4" fill="#27ae60" transform="rotate(25 34 120)"/>

  <!-- Tulip 2 (far left, shorter) -->
  <line x1="10" y1="115" x2="10" y2="155" stroke="#2ecc71" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 4 115 Q 2 100 10 94 Q 18 100 16 115 Z" fill="#f39c12"/>
  <path d="M 7 115 Q 9 104 10 97 Q 11 104 13 115 Z" fill="#e67e22"/>

  <!-- Tulip 3 (right) -->
  <line x1="176" y1="105" x2="176" y2="155" stroke="#2ecc71" stroke-width="3" stroke-linecap="round"/>
  <path d="M 168 105 Q 166 87 176 79 Q 186 87 184 105 Z" fill="#9b59b6"/>
  <path d="M 172 105 Q 174 91 176 83 Q 178 91 180 105 Z" fill="#8e44ad"/>
  <ellipse cx="166" cy="135" rx="10" ry="4" fill="#27ae60" transform="rotate(-20 166 135)"/>
  <ellipse cx="186" cy="125" rx="10" ry="4" fill="#27ae60" transform="rotate(30 186 125)"/>

  <!-- Tulip 4 (far right, shorter) -->
  <line x1="190" y1="118" x2="190" y2="155" stroke="#2ecc71" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 184 118 Q 182 105 190 99 Q 198 105 196 118 Z" fill="#e74c3c"/>
  <path d="M 187 118 Q 189 108 190 102 Q 191 108 193 118 Z" fill="#c0392b"/>

  <!-- Tulip 5 (center-left, behind creature) -->
  <line x1="56" y1="108" x2="56" y2="155" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
  <path d="M 50 108 Q 49 96 56 90 Q 63 96 62 108 Z" fill="#f1c40f"/>
  <path d="M 53 108 Q 55 99 56 93 Q 57 99 59 108 Z" fill="#f39c12"/>

  <!-- Creature: angular red panda-boltund sitting among tulips -->

  <!-- Tail (behind body) -->
  <path d="M 138 108 L 154 96 L 164 100 L 162 118 L 152 126 L 142 120 Z" fill="#c0392b"/>
  <line x1="152" y1="98" x2="150" y2="108" stroke="#4a1a0a" stroke-width="3" stroke-linecap="round"/>
  <line x1="156" y1="106" x2="152" y2="118" stroke="#4a1a0a" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="116" x2="144" y2="122" stroke="#4a1a0a" stroke-width="3" stroke-linecap="round"/>

  <!-- Body -->
  <path d="M 76 96 L 68 116 L 76 136 L 100 140 L 124 136 L 132 116 L 124 96 Z" fill="#c0392b"/>
  <path d="M 84 100 L 78 116 L 84 132 L 100 136 L 116 132 L 122 116 L 116 100 Z" fill="#f0d0a0"/>

  <!-- Ears -->
  <polygon points="72,20 82,48 60,44" fill="#c0392b"/>
  <polygon points="128,20 118,48 140,44" fill="#c0392b"/>
  <polygon points="74,26 81,44 64,42" fill="#e74c3c"/>
  <polygon points="126,26 119,44 136,42" fill="#e74c3c"/>

  <!-- Head -->
  <path d="M 70 46 L 62 66 L 70 86 L 100 92 L 130 86 L 138 66 L 130 46 Z" fill="#c0392b"/>

  <!-- Face plate -->
  <path d="M 78 52 L 72 66 L 78 82 L 100 88 L 122 82 L 128 66 L 122 52 Z" fill="#f0d0a0"/>

  <!-- Eye patches -->
  <path d="M 78 56 L 74 64 L 82 70 L 94 68 L 92 58 Z" fill="#4a1a0a"/>
  <path d="M 122 56 L 126 64 L 118 70 L 106 68 L 108 58 Z" fill="#4a1a0a"/>

  <!-- Eyes -->
  <ellipse cx="86" cy="62" rx="5.5" ry="6.5" fill="#1a1a1a"/>
  <ellipse cx="114" cy="62" rx="5.5" ry="6.5" fill="#1a1a1a"/>
  <circle cx="88" cy="59" r="2.8" fill="#fff"/>
  <circle cx="116" cy="59" r="2.8" fill="#fff"/>
  <circle cx="84" cy="64" r="1.3" fill="#fff" opacity="0.5"/>
  <circle cx="112" cy="64" r="1.3" fill="#fff" opacity="0.5"/>

  <!-- Nose -->
  <polygon points="97,72 103,72 100,76" fill="#1a1a1a"/>

  <!-- Mouth -->
  <path d="M 94 78 Q 97 82 100 80 Q 103 82 106 78" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Forehead zigzag -->
  <polyline points="84,50 90,44 96,50 102,44 108,50 114,44" fill="none" stroke="#4a1a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cheek tufts -->
  <polyline points="64,62 70,58 66,68 72,64" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="136,62 130,58 134,68 128,64" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Paws resting in front -->
  <ellipse cx="82" cy="140" rx="10" ry="6" fill="#c0392b"/>
  <ellipse cx="118" cy="140" rx="10" ry="6" fill="#c0392b"/>
  <ellipse cx="82" cy="140" rx="6" ry="4" fill="#f0d0a0"/>
  <ellipse cx="118" cy="140" rx="6" ry="4" fill="#f0d0a0"/>

  <!-- Small tulip held in right paw -->
  <line x1="124" y1="128" x2="128" y2="110" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
  <path d="M 123 110 Q 122 100 128 96 Q 134 100 133 110 Z" fill="#e84393"/>
  <path d="M 125 110 Q 127 103 128 98 Q 129 103 131 110 Z" fill="#d63384"/>
</svg>
