<svg xmlns="http://www.w3.org/2000/svg" width="160" height="140" viewBox="0 0 160 140">
  <!-- Magnifying glass hovering over a cracked surface, with notebook and pencil -->

  <style>
    .sk { stroke: #2a1a0a; stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Cracked/broken surface being examined -->
  <rect x="50" y="56" width="80" height="56" rx="3" fill="#e8e0d4" stroke="#2a1a0a" stroke-width="1.2"/>
  <!-- Crack pattern -->
  <path d="M 74 56 L 78 72 L 72 82 L 80 96 L 76 112" stroke="#8b4513" stroke-width="1.5" fill="none"/>
  <path d="M 78 72 L 92 68 L 100 76" stroke="#8b4513" stroke-width="1.2" fill="none"/>
  <path d="M 72 82 L 62 86" stroke="#8b4513" stroke-width="1" fill="none"/>
  <path d="M 80 96 L 94 92 L 104 100" stroke="#8b4513" stroke-width="1" fill="none"/>

  <!-- Grid lines (systematic examination) -->
  <line x1="50" y1="74" x2="130" y2="74" stroke="#aaa" stroke-width="0.4" stroke-dasharray="4,4"/>
  <line x1="50" y1="92" x2="130" y2="92" stroke="#aaa" stroke-width="0.4" stroke-dasharray="4,4"/>
  <line x1="70" y1="56" x2="70" y2="112" stroke="#aaa" stroke-width="0.4" stroke-dasharray="4,4"/>
  <line x1="90" y1="56" x2="90" y2="112" stroke="#aaa" stroke-width="0.4" stroke-dasharray="4,4"/>
  <line x1="110" y1="56" x2="110" y2="112" stroke="#aaa" stroke-width="0.4" stroke-dasharray="4,4"/>

  <!-- Magnifying glass (large, hovering) -->
  <circle cx="86" cy="48" r="28" fill="none" stroke="#5a3a1a" stroke-width="3.5"/>
  <circle cx="86" cy="48" r="26" fill="#f0ead6" opacity="0.12"/>
  <!-- Glint -->
  <path d="M 68 34 Q 74 28 84 28" stroke="#fff" stroke-width="2.5" fill="none" opacity="0.4"/>
  <!-- Handle -->
  <line x1="108" y1="68" x2="128" y2="88" stroke="#5a3a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="128" y1="88" x2="136" y2="96" stroke="#8b6b4b" stroke-width="6" stroke-linecap="round"/>

  <!-- Zoomed view through glass (bigger crack, more detail) -->
  <path d="M 80 38 L 84 50 L 78 56 L 86 64" stroke="#c0392b" stroke-width="2" fill="none"/>
  <path d="M 84 50 L 94 46" stroke="#c0392b" stroke-width="1.5" fill="none"/>
  <!-- Small markers in zoom view -->
  <circle cx="84" cy="50" r="2" fill="#e74c3c" opacity="0.6"/>
  <circle cx="78" cy="56" r="2" fill="#e74c3c" opacity="0.6"/>

  <!-- Notebook -->
  <rect x="6" y="82" width="34" height="44" rx="2" fill="#f8f4e8" stroke="#2a1a0a" stroke-width="1.2"/>
  <!-- Spiral binding -->
  <circle cx="6" cy="88" r="2" fill="none" stroke="#888" stroke-width="0.8"/>
  <circle cx="6" cy="96" r="2" fill="none" stroke="#888" stroke-width="0.8"/>
  <circle cx="6" cy="104" r="2" fill="none" stroke="#888" stroke-width="0.8"/>
  <circle cx="6" cy="112" r="2" fill="none" stroke="#888" stroke-width="0.8"/>
  <!-- Notes -->
  <text x="14" y="92" font-family="monospace" font-size="5" fill="#888">model:</text>
  <line x1="14" y1="98" x2="34" y2="98" stroke="#ccc" stroke-width="0.8"/>
  <text x="14" y="106" font-family="monospace" font-size="5" fill="#888">predict:</text>
  <line x1="14" y1="112" x2="32" y2="112" stroke="#ccc" stroke-width="0.8"/>
  <text x="14" y="120" font-family="monospace" font-size="5" fill="#888">test:</text>

  <!-- Pencil alongside notebook -->
  <line x1="42" y1="126" x2="48" y2="84" stroke="#f4c542" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="84" x2="49" y2="80" stroke="#2a1a0a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="126" x2="41.5" y2="128" stroke="#f0b0a0" stroke-width="2" stroke-linecap="round"/>

  <!-- Surface line -->
  <line x1="0" y1="130" x2="160" y2="130" stroke="#2a1a0a" stroke-width="1" stroke-dasharray="3,5"/>
</svg>
