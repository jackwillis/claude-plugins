<svg xmlns="http://www.w3.org/2000/svg" width="160" height="140" viewBox="0 0 160 140">
  <!-- Quill pen, ink pot, and a neat stack of labeled documents -->

  <style>
    .sk { stroke: #2a1a0a; stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Stack of documents (slightly fanned) -->
  <!-- Bottom doc -->
  <g transform="rotate(-3 90 80)">
    <rect x="56" y="50" width="56" height="72" rx="2" fill="#f0ead6" stroke="#2a1a0a" stroke-width="1"/>
  </g>
  <!-- Middle doc -->
  <g transform="rotate(1 88 80)">
    <rect x="58" y="48" width="56" height="72" rx="2" fill="#f4f0e4" stroke="#2a1a0a" stroke-width="1"/>
  </g>
  <!-- Top doc -->
  <rect x="60" y="46" width="56" height="72" rx="2" fill="#f8f4e8" stroke="#2a1a0a" stroke-width="1.2"/>

  <!-- Text lines on top doc -->
  <rect x="68" y="54" width="32" height="4" rx="1" fill="#ddd"/>
  <line x1="68" y1="64" x2="106" y2="64" stroke="#ccc" stroke-width="1"/>
  <line x1="68" y1="70" x2="104" y2="70" stroke="#ccc" stroke-width="1"/>
  <line x1="68" y1="76" x2="100" y2="76" stroke="#ccc" stroke-width="1"/>
  <line x1="68" y1="82" x2="102" y2="82" stroke="#ccc" stroke-width="1"/>
  <line x1="68" y1="88" x2="96" y2="88" stroke="#ccc" stroke-width="1"/>

  <!-- Format labels on doc edges (tabs) -->
  <rect x="112" y="56" width="20" height="10" rx="2" fill="#e74c3c" stroke="#2a1a0a" stroke-width="0.8"/>
  <text x="122" y="64" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">.pdf</text>

  <rect x="110" y="76" width="18" height="10" rx="2" fill="#3498db" stroke="#2a1a0a" stroke-width="0.8"/>
  <text x="119" y="84" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">.md</text>

  <rect x="108" y="96" width="20" height="10" rx="2" fill="#2ecc71" stroke="#2a1a0a" stroke-width="0.8"/>
  <text x="118" y="104" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff">.txt</text>

  <!-- Ink pot -->
  <path d="M 18 94 Q 14 94 12 90 L 12 78 Q 12 74 16 74 L 30 74 Q 34 74 34 78 L 34 90 Q 32 94 28 94 Z" fill="#1a1a2e" stroke="#2a1a0a" stroke-width="1.2"/>
  <!-- Ink surface -->
  <ellipse cx="23" cy="76" rx="10" ry="3" fill="#2a2a4e" stroke="#2a1a0a" stroke-width="0.8"/>
  <!-- Ink glint -->
  <path d="M 18 75 Q 20 73 24 74" stroke="#555" stroke-width="0.8" fill="none"/>

  <!-- Quill pen (in ink, angled up) -->
  <line x1="22" y1="76" x2="46" y2="28" stroke="#5a3a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Feather -->
  <path d="M 46 28 Q 52 20 56 8 Q 48 14 44 12 Q 40 18 38 16 Q 42 24 46 28" fill="#f0d0a0" stroke="#2a1a0a" stroke-width="0.8"/>
  <!-- Feather spine -->
  <line x1="46" y1="28" x2="54" y2="12" stroke="#5a3a1a" stroke-width="0.8"/>
  <!-- Barbs -->
  <line x1="48" y1="24" x2="44" y2="20" stroke="#c0a070" stroke-width="0.5"/>
  <line x1="50" y1="20" x2="46" y2="16" stroke="#c0a070" stroke-width="0.5"/>
  <line x1="52" y1="16" x2="48" y2="14" stroke="#c0a070" stroke-width="0.5"/>

  <!-- Ink drip from pen tip -->
  <circle cx="24" cy="80" r="1.5" fill="#1a1a2e" opacity="0.4"/>

  <!-- Ink spot on table -->
  <ellipse cx="40" cy="120" rx="4" ry="1.5" fill="#1a1a2e" opacity="0.15"/>

  <!-- Table/surface -->
  <line x1="0" y1="122" x2="160" y2="122" stroke="#2a1a0a" stroke-width="1.2"/>
  <rect x="0" y="122" width="160" height="18" fill="#c0935a" opacity="0.15"/>
</svg>
